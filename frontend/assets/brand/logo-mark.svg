<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="L5S1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="disc" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="45%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="mid" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="40%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f766e" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- App tile -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Top vertebra -->
  <rect x="40" y="28" width="48" height="18" rx="9" fill="url(#disc)" filter="url(#soft)" opacity="0.95"/>
  <ellipse cx="52" cy="34" rx="10" ry="4" fill="#fff" opacity="0.35"/>
  <!-- Disc (mid) -->
  <ellipse cx="64" cy="64" rx="38" ry="16" fill="url(#mid)" filter="url(#soft)"/>
  <ellipse cx="50" cy="58" rx="14" ry="5" fill="#fff" opacity="0.4"/>
  <!-- Bottom vertebra -->
  <rect x="40" y="82" width="48" height="18" rx="9" fill="url(#disc)" filter="url(#soft)" opacity="0.95"/>
  <ellipse cx="52" cy="88" rx="10" ry="4" fill="#fff" opacity="0.3"/>
</svg>
