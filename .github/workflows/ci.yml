name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pin a patched 1.24.x (stdlib vulns fixed after 1.24.0)
          go-version: "1.24.13"
          cache-dependency-path: backend/go.sum
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: ESLint (security)
        run: |
          npm install --no-save eslint eslint-plugin-security
          npx eslint js/
