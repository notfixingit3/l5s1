name: Container

# Multi-arch GHCR builds are expensive — only run for beta tags (and manual runs).
on:
  push:
    tags:
      - "v*-beta.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version metadata
        id: meta_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF_NAME}"
            VERSION="${RAW#v}"
          else
            # workflow_dispatch without a tag
            VERSION="$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0-dev")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} commit=${GITHUB_SHA::7}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=dev

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta_version.outputs.version }}
            COMMIT=${{ steps.meta_version.outputs.commit }}
            BUILD_TIME=${{ steps.meta_version.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          {
            echo "## L5S1 container published"
            echo ""
            echo "**Version:** \`${{ steps.meta_version.outputs.version }}\`"
            echo "**Commit:** \`${{ steps.meta_version.outputs.commit }}\`"
            echo ""
            echo "### Pull"
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.meta_version.outputs.version }}"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
            echo ""
            echo "### Run (local WebAuthn)"
            echo '```bash'
            echo "docker run --rm -p 8080:8080 \\"
            echo "  -e WEBAUTHN_RP_ID=localhost \\"
            echo "  -e WEBAUTHN_ORIGINS=http://localhost:8080 \\"
            echo "  -v l5s1-data:/data \\"
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.meta_version.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
