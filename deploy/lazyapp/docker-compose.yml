# L5S1 production-style stack — GHCR image behind Traefik (HTTPS).
# Refresh: docker compose pull && docker compose up -d
#
# WebAuthn RP ID must be the registrable domain (l5s1.com).
# Origins must list every HTTPS origin users open in the browser.

services:
  app:
    image: ghcr.io/notfixingit3/l5s1:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: l5s1
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /data
      DATABASE_DSN: "file:/data/l5s1.db?cache=shared&mode=rwc"
      FRONTEND_DIR: /app/frontend
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?set WEBAUTHN_RP_ID in .env}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS:?set WEBAUTHN_ORIGINS in .env}
      WEBAUTHN_RP_DISPLAY_NAME: ${WEBAUTHN_RP_DISPLAY_NAME:-L5S1 Health Registry}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SECURE_COOKIE: ${SECURE_COOKIE:-true}
      GIN_MODE: release
      # Web Push (optional — if unset, app generates VAPID keys into SQLite app_configs)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@l5s1.com}
    # Host bind only — SQLite next to compose (not a named Docker volume)
    volumes:
      - type: bind
        source: ./data
        target: /data
    networks:
      - lazyapp
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.l5s1.service=l5s1"
      - "traefik.http.routers.l5s1.rule=Host(`${APP_HOST}`) || Host(`${APP_HOST_WWW}`)"
      - "traefik.http.routers.l5s1.entrypoints=websecure"
      - "traefik.http.routers.l5s1.tls.certResolver=lets-encrypt"
      - "traefik.http.routers.l5s1.middlewares=crowdsec-l5s1"
      - "traefik.http.services.l5s1.loadbalancer.server.port=8080"
      # HTTP → HTTPS
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.l5s1_http.rule=Host(`${APP_HOST}`) || Host(`${APP_HOST_WWW}`)"
      - "traefik.http.routers.l5s1_http.entrypoints=web"
      - "traefik.http.routers.l5s1_http.middlewares=https-redirect"
      # CrowdSec bouncer (shared edge)
      - "traefik.http.middlewares.crowdsec-l5s1.plugin.crowdsec-bouncer.enable=true"
      - "traefik.http.middlewares.crowdsec-l5s1.plugin.crowdsec-bouncer.crowdseclapikey=${CROWDSEC_BOUNCER_KEY}"

networks:
  lazyapp:
    external: true
    name: lazyapp_me
